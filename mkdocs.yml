site_name: Qortex
site_description: ML-ready neurodata from OpenNeuro and BIDS datasets
site_url: https://ginkgoq.github.io/Qortex/
repo_url: https://github.com/GinkgoQ/Qortex
repo_name: GinkgoQ/Qortex
docs_dir: docs

theme:
  name: material
  language: en
  logo: assets/images/qortex-mark.svg
  favicon: assets/images/qortex-mark.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - content.tooltips
  font:
    text: Inter
    code: IBM Plex Mono

extra_css:
  - assets/stylesheets/theme.css

extra_javascript:
  - assets/javascripts/openneuro-stats.js

hooks:
  - docs/hooks.py

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: sphinx
            members_order: source
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            inherited_members: false
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

